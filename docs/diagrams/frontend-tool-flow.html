<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nango Frontend Tools — Build &amp; Execute Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" integrity="sha384-ZZ1pncU3bQe8y31yfZdMFdSpttDoPmOZg2wguVK9almUodir1PghgT0eY7Mrty8H" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js" integrity="sha384-en/ztfPSRkGfME4KIm05joYXynqzUgbsG5nMrj/xEFAHXkeZfO3yMK8QQ+mP7p1/" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'JetBrains Mono', monospace; background: #020617; min-height: 100vh; padding: 2rem; color: white; }
    .container { max-width: 2000px; margin: 0 auto; }
    .header { margin-bottom: 2rem; }
    .header-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; }
    .pulse-dot { width: 12px; height: 12px; background: #fb923c; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.025em; }
    .subtitle { color: #94a3b8; font-size: 0.875rem; margin-left: 1.75rem; }
    .diagram-container { background: rgba(15, 23, 42, 0.5); border-radius: 1rem; border: 1px solid #1e293b; padding: 1.5rem; overflow-x: auto; }
    svg { width: 100%; min-width: 1920px; display: block; }
    .legend { display: flex; gap: 1.5rem; margin-top: 1rem; flex-wrap: wrap; font-size: 0.8rem; color: #94a3b8; }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; }
    .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid; }
    .footer { text-align: center; margin-top: 1.5rem; color: #475569; font-size: 0.75rem; }
    .toolbar { display: flex; gap: 0.5rem; margin-left: auto; flex-shrink: 0; align-items: center; }
    .toolbar-toggle { background: transparent; border: none; color: #475569; cursor: pointer; font-size: 1.25rem; line-height: 1; padding: 0.25rem 0.5rem; border-radius: 0.375rem; transition: color 0.2s, background 0.2s; }
    .toolbar-toggle:hover { color: #94a3b8; background: rgba(30, 41, 59, 0.5); }
    .toolbar-actions { display: none; gap: 0.5rem; }
    .toolbar.expanded .toolbar-actions { display: flex; }
    .toolbar-actions button { background: rgba(30, 41, 59, 0.8); border: 1px solid #334155; color: #94a3b8; padding: 0.375rem 0.75rem; border-radius: 0.375rem; font-family: inherit; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .toolbar-actions button:hover { background: rgba(51, 65, 85, 0.8); color: white; border-color: #475569; }
    @media print { body { background: #020617; padding: 1rem; } .toolbar { display: none !important; } }
  </style>
</head>
<body>
  <div class="container" id="report-container">
    <div class="header">
      <div class="header-row">
        <div class="pulse-dot"></div>
        <h1>Nango Frontend Tools — Build &amp; Execute Flow</h1>
        <div class="toolbar">
          <div class="toolbar-actions">
            <button onclick="copyAsImage(this)">📋 Copy</button>
            <button onclick="downloadPNG(this)">🖼️ PNG</button>
            <button onclick="downloadPDF(this)">📄 PDF</button>
          </div>
          <button class="toolbar-toggle" onclick="this.parentElement.classList.toggle('expanded')" title="Export options" aria-label="Export options">⋯</button>
        </div>
      </div>
      <p class="subtitle">Frontend → Server → LLM · 7 stages from React mount to recursive runAgent</p>
    </div>

    <div class="diagram-container">
      <svg viewBox="0 0 1944 2120">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
          </marker>
          <marker id="arrowhead-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c" />
          </marker>
          <marker id="arrowhead-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" />
          </marker>
          <marker id="arrowhead-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#34d399" />
          </marker>
          <marker id="arrowhead-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa" />
          </marker>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)" />

        <!-- ============== LANE HEADERS ============== -->
        <rect x="60" y="20" width="540" height="40" rx="6" fill="rgba(8, 51, 68, 0.6)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="330" y="46" fill="#22d3ee" font-size="13" font-weight="700" text-anchor="middle">Frontend  (Browser · React · CopilotKit client)</text>
        <rect x="720" y="20" width="648" height="40" rx="6" fill="rgba(6, 78, 59, 0.6)" stroke="#34d399" stroke-width="1.5"/>
        <text x="1044" y="46" fill="#34d399" font-size="13" font-weight="700" text-anchor="middle">Server  (Nango · CopilotKit runtime · Vercel AI SDK)</text>
        <rect x="1488" y="20" width="346" height="40" rx="6" fill="rgba(76, 29, 149, 0.6)" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="1661" y="46" fill="#c4b5fd" font-size="13" font-weight="700" text-anchor="middle">LLM  (external API)</text>

        <!-- LANE BACKGROUNDS (continuous, full height) -->
        <rect x="60" y="80" width="540" height="2020" rx="6" fill="rgba(8, 51, 68, 0.12)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4,3"/>
        <rect x="720" y="80" width="648" height="2020" rx="6" fill="rgba(6, 78, 59, 0.12)" stroke="#34d399" stroke-width="1" stroke-dasharray="4,3"/>
        <rect x="1488" y="80" width="346" height="2020" rx="6" fill="rgba(76, 29, 149, 0.12)" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>

        <!-- ============================================================ -->
        <!-- STAGE 1 — REGISTER  (frontend only)                          -->
        <!-- ============================================================ -->
        <!-- Frontend -->
        <rect x="60" y="100" width="540" height="220" rx="6" fill="#0f172a"/>
        <rect x="60" y="100" width="540" height="220" rx="6" fill="rgba(76, 29, 149, 0.3)" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="330" y="126" fill="white" font-size="14" font-weight="700" text-anchor="middle">1 · REGISTER</text>
        <text x="330" y="143" fill="#a78bfa" font-size="11" text-anchor="middle">React mount after user picks an agent</text>
        <text x="76" y="172" fill="#cbd5e1" font-size="11" font-weight="700">RightPanel mounts ChatProviderHooks:</text>
        <text x="76" y="190" fill="#cbd5e1" font-size="11">  useOutcomeTools()            → render_chart</text>
        <text x="76" y="206" fill="#cbd5e1" font-size="11">  useInteractiveTools()      → ask_user_*  (×4)</text>
        <text x="76" y="222" fill="#cbd5e1" font-size="11">  useHandoffTools() → switch_agent_with_context</text>
        <line x1="76" y1="236" x2="584" y2="236" stroke="#a78bfa" stroke-width="0.6" opacity="0.4" stroke-dasharray="3,3"/>
        <text x="76" y="256" fill="#cbd5e1" font-size="11">Each hook pushes a tool spec to <tspan fill="#fb923c">copilotkit._tools[]</tspan></text>
        <text x="76" y="272" fill="#94a3b8" font-size="11">  { name, description, parameters, handler }</text>
        <text x="76" y="288" fill="#94a3b8" font-size="11">  ← handler closure stays in browser (never serialised)</text>
        <text x="76" y="308" fill="#fb923c" font-size="11">Renderers register through useRenderTool</text>

        <!-- ============================================================ -->
        <!-- STAGE 2 — UPLOAD  (frontend POST → server)                   -->
        <!-- ============================================================ -->
        <rect x="60" y="360" width="540" height="220" rx="6" fill="#0f172a"/>
        <rect x="60" y="360" width="540" height="220" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="330" y="386" fill="white" font-size="14" font-weight="700" text-anchor="middle">2 · UPLOAD</text>
        <text x="330" y="403" fill="#22d3ee" font-size="11" text-anchor="middle">user hits Send</text>
        <text x="76" y="432" fill="#cbd5e1" font-size="11">CopilotChat fires <tspan fill="#fb923c">runAgent()</tspan>:</text>
        <text x="76" y="450" fill="#cbd5e1" font-size="11">  tools = copilotkit.buildFrontendTools(agentId)</text>
        <text x="76" y="466" fill="#cbd5e1" font-size="11">    ↳ filter _tools[] by agentId scope</text>
        <text x="76" y="482" fill="#cbd5e1" font-size="11">    ↳ project each to <tspan fill="#fb923c">{ name, description,</tspan></text>
        <text x="76" y="498" fill="#fb923c" font-size="11">                       parameters: JSON-Schema }</text>
        <text x="76" y="518" fill="#94a3b8" font-size="10.5" font-style="italic">  handler is NOT serialised — it never leaves the browser</text>
        <text x="76" y="548" fill="#22d3ee" font-size="11" font-weight="700">SSE stream opens, stays connected until RUN_FINISHED</text>

        <!-- Server: receives POST -->
        <rect x="720" y="360" width="648" height="220" rx="6" fill="#0f172a"/>
        <rect x="720" y="360" width="648" height="220" rx="6" fill="rgba(6, 78, 59, 0.35)" stroke="#34d399" stroke-width="1.5"/>
        <text x="1044" y="386" fill="white" font-size="14" font-weight="700" text-anchor="middle">receives RunAgentInput</text>
        <text x="1044" y="403" fill="#34d399" font-size="11" text-anchor="middle">POST /api/copilotkit/builtin/agent/&lt;id&gt;/run</text>
        <rect x="736" y="424" width="616" height="56" rx="4" fill="rgba(8, 51, 68, 0.5)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="3,2"/>
        <text x="754" y="444" fill="#22d3ee" font-size="11" font-weight="700">RunAgentInput {</text>
        <text x="754" y="460" fill="#94a3b8" font-size="10.5">  runId, threadId, messages,  <tspan fill="#fb923c">tools[]</tspan>,  context, forwardedProps</text>
        <text x="754" y="475" fill="#94a3b8" font-size="10.5">}</text>
        <text x="736" y="502" fill="#cbd5e1" font-size="11">  tools[] = each frontend tool's schema-only projection</text>
        <text x="736" y="518" fill="#cbd5e1" font-size="11">  (server now KNOWS about every frontend tool, by name)</text>
        <text x="736" y="544" fill="#94a3b8" font-size="11">  user message persisted via recordUserMessage</text>
        <text x="736" y="560" fill="#94a3b8" font-size="11">  entity_run row created with status: running</text>

        <!-- ============================================================ -->
        <!-- STAGE 3 — BUILD AGENT  (server only)                         -->
        <!-- ============================================================ -->
        <!-- Server: build agent + merge tools -->
        <rect x="720" y="620" width="648" height="220" rx="6" fill="#0f172a"/>
        <rect x="720" y="620" width="648" height="220" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="1044" y="646" fill="white" font-size="14" font-weight="700" text-anchor="middle">3 · BUILD AGENT &amp; MERGE TOOL CATALOG</text>
        <text x="1044" y="663" fill="#34d399" font-size="11" text-anchor="middle">per-request BuiltInAgent — frontend schemas + server-side ToolDefinitions</text>
        <text x="736" y="692" fill="#cbd5e1" font-size="11" font-weight="700">runtime constructs a fresh <tspan fill="#fb923c">new BuiltInAgent({ ... })</tspan> for this request:</text>
        <text x="736" y="714" fill="#cbd5e1" font-size="11">  allTools = convertToolsToVercelAITools(input.tools)        <tspan fill="#fb923c">// NO execute</tspan></text>
        <text x="736" y="730" fill="#cbd5e1" font-size="11">  if (config.tools.length) {</text>
        <text x="736" y="746" fill="#cbd5e1" font-size="11">    serverTools = convertToolDefinitionsToVercelAITools(config.tools) <tspan fill="#fb923c">// WITH execute</tspan></text>
        <text x="736" y="762" fill="#cbd5e1" font-size="11">    allTools = { ...allTools, ...serverTools }    <tspan fill="#fb923c">// server overrides same-name</tspan></text>
        <text x="736" y="778" fill="#cbd5e1" font-size="11">  }</text>
        <text x="736" y="804" fill="#94a3b8" font-size="11">The LLM will see ONE unified tool catalog —</text>
        <text x="736" y="820" fill="#94a3b8" font-size="11">it has no way to distinguish frontend vs server tools.</text>

        <!-- ============================================================ -->
        <!-- STAGE 4 — LLM CALL  (server ↔ LLM)                           -->
        <!-- ============================================================ -->
        <!-- Frontend: receiving SSE -->
        <rect x="60" y="880" width="540" height="200" rx="6" fill="#0f172a"/>
        <rect x="60" y="880" width="540" height="200" rx="6" fill="rgba(8, 51, 68, 0.35)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="330" y="906" fill="white" font-size="14" font-weight="700" text-anchor="middle">SSE: receiving AG-UI events</text>
        <text x="330" y="923" fill="#22d3ee" font-size="11" text-anchor="middle">forwarded from streamText via the server</text>
        <text x="76" y="952" fill="#cbd5e1" font-size="11">↓ RUN_STARTED</text>
        <text x="76" y="968" fill="#94a3b8" font-size="10.5">  threadId, runId locked in</text>
        <text x="76" y="990" fill="#cbd5e1" font-size="11">↓ TEXT_MESSAGE_START / CONTENT / END</text>
        <text x="76" y="1006" fill="#94a3b8" font-size="10.5">  appended to agent.messages (assistant role)</text>
        <text x="76" y="1028" fill="#cbd5e1" font-size="11">↓ TOOL_CALL_START / ARGS / END</text>
        <text x="76" y="1044" fill="#94a3b8" font-size="10.5">  ag-ui apply pipeline builds the toolCall on</text>
        <text x="76" y="1060" fill="#94a3b8" font-size="10.5">  agent.messages; renderer can show partial args</text>

        <!-- Server: streamText -->
        <rect x="720" y="880" width="648" height="200" rx="6" fill="#0f172a"/>
        <rect x="720" y="880" width="648" height="200" rx="6" fill="rgba(6, 78, 59, 0.35)" stroke="#34d399" stroke-width="1.5"/>
        <text x="1044" y="906" fill="white" font-size="14" font-weight="700" text-anchor="middle">4 · streamText() — bridge to LLM</text>
        <text x="1044" y="923" fill="#34d399" font-size="11" text-anchor="middle">AI SDK opens an HTTP request to the LLM provider</text>
        <text x="736" y="952" fill="#cbd5e1" font-size="11"><tspan fill="#fb923c">streamText({</tspan> model, messages, tools: allTools, toolChoice <tspan fill="#fb923c">})</tspan></text>
        <text x="736" y="982" fill="#94a3b8" font-size="11">  ← receives a stream of parts from the LLM:</text>
        <text x="736" y="1000" fill="#cbd5e1" font-size="11">    • text                              → AG-UI TEXT_MESSAGE_*</text>
        <text x="736" y="1016" fill="#cbd5e1" font-size="11">    • tool-input-start / delta / end    → AG-UI TOOL_CALL_*</text>
        <text x="736" y="1038" fill="#94a3b8" font-size="11">Server re-emits each part as an AG-UI event on the SSE.</text>
        <text x="736" y="1062" fill="#fb923c" font-size="11" font-weight="700">tool-input-end → server runs Stage 5; matching TOOL_CALL_END reaches browser in parallel</text>

        <!-- LLM: generates -->
        <rect x="1488" y="880" width="346" height="200" rx="6" fill="#0f172a"/>
        <rect x="1488" y="880" width="346" height="200" rx="6" fill="rgba(76, 29, 149, 0.3)" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="1661" y="906" fill="white" font-size="14" font-weight="700" text-anchor="middle">LLM completion</text>
        <text x="1661" y="923" fill="#c4b5fd" font-size="11" text-anchor="middle">streams tokens + tool-call decisions</text>
        <text x="1504" y="952" fill="#cbd5e1" font-size="11">receives:</text>
        <text x="1504" y="968" fill="#94a3b8" font-size="10.5">  • messages (system + user + history)</text>
        <text x="1504" y="984" fill="#94a3b8" font-size="10.5">  • the unified tool catalog</text>
        <text x="1504" y="1006" fill="#cbd5e1" font-size="11">emits (streaming):</text>
        <text x="1504" y="1022" fill="#94a3b8" font-size="10.5">  • text deltas (optional)</text>
        <text x="1504" y="1038" fill="#94a3b8" font-size="10.5">  • tool_calls with</text>
        <text x="1504" y="1054" fill="#94a3b8" font-size="10.5">    { name, arguments }</text>
        <text x="1504" y="1074" fill="#a78bfa" font-size="10.5" font-style="italic">  (no awareness of execute or not)</text>

        <!-- ============================================================ -->
        <!-- STAGE 5 — DISPATCH  (server-only decision, no new event to FE) -->
        <!-- ============================================================ -->
        <!-- Frontend: dispatch on SSE events (NOT waiting) -->
        <rect x="60" y="1120" width="540" height="320" rx="6" fill="#0f172a"/>
        <rect x="60" y="1120" width="540" height="320" rx="6" fill="rgba(8, 51, 68, 0.35)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="330" y="1146" fill="white" font-size="14" font-weight="700" text-anchor="middle">5 · Frontend dispatch on SSE events</text>
        <text x="330" y="1163" fill="#22d3ee" font-size="11" text-anchor="middle">AG-UI apply pipeline reacts as each event lands — no blocking wait</text>
        <text x="76" y="1192" fill="#cbd5e1" font-size="11">On <tspan fill="#fb923c" font-weight="700">TOOL_CALL_END</tspan> the client looks up <tspan fill="#fb923c">copilotkit._tools[name]</tspan>:</text>
        <text x="76" y="1220" fill="#34d399" font-size="11" font-weight="700">▸ Server-tool branch  <tspan fill="#94a3b8" font-weight="400" font-style="italic">(no handler in _tools)</tspan></text>
        <text x="76" y="1238" fill="#cbd5e1" font-size="10.5">   nothing to do on TOOL_CALL_END</text>
        <text x="76" y="1254" fill="#cbd5e1" font-size="10.5">   on <tspan fill="#fb923c" font-weight="700">TOOL_CALL_RESULT</tspan> → append result to agent.messages</text>
        <text x="76" y="1270" fill="#cbd5e1" font-size="10.5">   SSE stays open; LLM keeps streaming the same completion</text>
        <text x="76" y="1318" fill="#fb923c" font-size="11" font-weight="700">▸ Frontend-tool branch  <tspan fill="#94a3b8" font-weight="400" font-style="italic">(handler found in _tools)</tspan></text>
        <text x="76" y="1336" fill="#cbd5e1" font-size="10.5">   invoke handler immediately → Stage 6</text>
        <text x="76" y="1352" fill="#cbd5e1" font-size="10.5">    · sync  → return value pushed onto agent.messages</text>
        <text x="76" y="1368" fill="#cbd5e1" font-size="10.5">    · HITL  → unresolved Promise; renderer mounts interactive UI</text>
        <text x="76" y="1384" fill="#cbd5e1" font-size="10.5">   later <tspan fill="#fb923c" font-weight="700">RUN_FINISHED</tspan> lands → SSE closes</text>
        <text x="76" y="1418" fill="#94a3b8" font-size="10" font-style="italic">Both branches are reactive — frontend never blocks waiting for a "verdict".</text>

        <!-- Server: dispatch (single block, if/else pseudocode) -->
        <rect x="720" y="1120" width="648" height="320" rx="6" fill="#0f172a"/>
        <rect x="720" y="1120" width="648" height="320" rx="6" fill="rgba(6, 78, 59, 0.35)" stroke="#34d399" stroke-width="1.5"/>
        <text x="1044" y="1146" fill="white" font-size="14" font-weight="700" text-anchor="middle">5 · TOOL-CALL DISPATCH</text>
        <text x="1044" y="1163" fill="#34d399" font-size="11" text-anchor="middle">streamText reacts to tool-input-end based ONLY on whether tool.execute exists</text>
        <text x="736" y="1190" fill="#94a3b8" font-size="10.5" font-style="italic">(server has no notion of "frontend tool" vs "server tool" — it just checks the field)</text>
        <text x="736" y="1218" fill="#34d399" font-size="11" font-weight="700">▸ When a server-side tool was called  <tspan fill="#94a3b8" font-weight="400" font-style="italic">(the tool has execute() defined)</tspan></text>
        <text x="736" y="1236" fill="#cbd5e1" font-size="11">   runtime calls:  result = <tspan fill="#fb923c">await</tspan> tool.execute(args)</text>
        <text x="736" y="1252" fill="#cbd5e1" font-size="11">   → emit <tspan fill="#fb923c">TOOL_CALL_RESULT</tspan> to AG-UI; feed result back to streamText</text>
        <text x="736" y="1268" fill="#cbd5e1" font-size="11">   → streamText auto-continues in the <tspan fill="#fb923c" font-weight="700">SAME SSE</tspan> → loops back to Stage 4</text>
        <text x="736" y="1284" fill="#94a3b8" font-size="10" font-style="italic">   e.g. extract_dataset_by_sql, run_ssh_command, run_code_in_sandbox</text>
        <text x="736" y="1318" fill="#fb923c" font-size="11" font-weight="700">▸ When a frontend tool was called  <tspan fill="#94a3b8" font-weight="400" font-style="italic">(no execute() defined)</tspan></text>
        <text x="736" y="1336" fill="#cbd5e1" font-size="11">   runtime does nothing — no execute, no tool-result fed back</text>
        <text x="736" y="1352" fill="#cbd5e1" font-size="11">   → current LLM completion has no continuation → streamText finalizes</text>
        <text x="736" y="1368" fill="#cbd5e1" font-size="11">   → emit <tspan fill="#fb923c" font-weight="700">RUN_FINISHED</tspan> → SSE closes  <tspan fill="#94a3b8" font-style="italic">(client will reissue runAgent — Stage 7)</tspan></text>
        <text x="736" y="1384" fill="#94a3b8" font-size="10" font-style="italic">   e.g. render_chart, ask_user_*, switch_agent_with_context</text>

        <!-- LLM: continuation behaviour -->
        <rect x="1488" y="1120" width="346" height="320" rx="6" fill="#0f172a"/>
        <rect x="1488" y="1120" width="346" height="320" rx="6" fill="rgba(76, 29, 149, 0.18)" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="1661" y="1146" fill="white" font-size="13" font-weight="700" text-anchor="middle">LLM after the tool call</text>
        <text x="1661" y="1163" fill="#c4b5fd" font-size="11" text-anchor="middle">same completion or fresh one?</text>
        <text x="1504" y="1196" fill="#34d399" font-size="11" font-weight="700">if-branch (execute ran):</text>
        <text x="1504" y="1214" fill="#94a3b8" font-size="10.5">  • receives the tool-result via</text>
        <text x="1504" y="1230" fill="#94a3b8" font-size="10.5">    streamText's continuation</text>
        <text x="1504" y="1246" fill="#94a3b8" font-size="10.5">  • keeps generating in the SAME</text>
        <text x="1504" y="1262" fill="#94a3b8" font-size="10.5">    HTTP completion</text>
        <text x="1504" y="1278" fill="#94a3b8" font-size="10.5">  • may emit more text / tool calls</text>
        <line x1="1504" y1="1296" x2="1822" y2="1296" stroke="#a78bfa" stroke-width="0.6" opacity="0.4" stroke-dasharray="3,3"/>
        <text x="1504" y="1316" fill="#fb923c" font-size="11" font-weight="700">else-branch (no execute):</text>
        <text x="1504" y="1334" fill="#94a3b8" font-size="10.5">  • this completion is DONE</text>
        <text x="1504" y="1350" fill="#94a3b8" font-size="10.5">  • HTTP connection closes</text>
        <text x="1504" y="1366" fill="#94a3b8" font-size="10.5">  • LLM has no awareness of the</text>
        <text x="1504" y="1382" fill="#94a3b8" font-size="10.5">    pending tool</text>
        <text x="1504" y="1402" fill="#94a3b8" font-size="10.5">  • Stage 7 fires a NEW completion</text>
        <text x="1504" y="1418" fill="#94a3b8" font-size="10.5">    with prior context + tool result</text>

        <!-- ============================================================ -->
        <!-- STAGE 6 — BROWSER EXECUTE  (two classes: sync vs HITL)        -->
        <!-- ============================================================ -->
        <rect x="60" y="1480" width="540" height="460" rx="6" fill="#0f172a"/>
        <rect x="60" y="1480" width="540" height="460" rx="6" fill="rgba(8, 51, 68, 0.35)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="330" y="1506" fill="white" font-size="14" font-weight="700" text-anchor="middle">6 · BROWSER EXECUTES THE HANDLER</text>
        <text x="330" y="1523" fill="#22d3ee" font-size="11" text-anchor="middle">continued from Stage 5 — <tspan fill="#fb923c" font-weight="700">frontend-tool branch only</tspan> · two classes by WHEN the result resolves</text>

        <!-- Immediate (sync) -->
        <rect x="76" y="1546" width="250" height="380" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1"/>
        <text x="201" y="1572" fill="white" font-size="12" font-weight="700" text-anchor="middle">▸ Immediate (sync)</text>
        <text x="201" y="1588" fill="#22d3ee" font-size="10" text-anchor="middle">useOutcomeTools · useHandoffTools</text>
        <text x="88" y="1616" fill="#cbd5e1" font-size="11">handler runs synchronously and</text>
        <text x="88" y="1632" fill="#cbd5e1" font-size="11">returns the result right away.</text>
        <text x="88" y="1660" fill="#94a3b8" font-size="10.5">Side effects (zustand stores, UI</text>
        <text x="88" y="1676" fill="#94a3b8" font-size="10.5">mount) fire-and-forget before the</text>
        <text x="88" y="1692" fill="#94a3b8" font-size="10.5">return.</text>
        <text x="88" y="1720" fill="#cbd5e1" font-size="10.5">Examples:</text>
        <text x="88" y="1736" fill="#fb923c" font-size="10.5">  render_chart  → { ok, chartId }</text>
        <text x="88" y="1752" fill="#fb923c" font-size="10.5">  switch_agent_* → { ok, switchedTo }</text>
        <text x="88" y="1788" fill="#94a3b8" font-size="10.5">The return value is appended to</text>
        <text x="88" y="1804" fill="#94a3b8" font-size="10.5">agent.messages as a synthetic</text>
        <text x="88" y="1820" fill="#94a3b8" font-size="10.5">tool-message immediately.</text>
        <text x="88" y="1864" fill="#94a3b8" font-size="9" font-style="italic">→ proceeds straight to Stage 7</text>

        <!-- HITL (async, waits for user) -->
        <rect x="334" y="1546" width="250" height="380" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1"/>
        <text x="459" y="1572" fill="white" font-size="12" font-weight="700" text-anchor="middle">▸ HITL (async, blocking)</text>
        <text x="459" y="1588" fill="#22d3ee" font-size="10" text-anchor="middle">useInteractiveTools</text>
        <text x="346" y="1616" fill="#cbd5e1" font-size="11">handler returns an UNRESOLVED</text>
        <text x="346" y="1632" fill="#cbd5e1" font-size="11">Promise — execution PAUSES.</text>
        <text x="346" y="1660" fill="#94a3b8" font-size="10.5">Renderer mounts an interactive UI</text>
        <text x="346" y="1676" fill="#94a3b8" font-size="10.5">(chips / buttons / input / picker)</text>
        <text x="346" y="1692" fill="#94a3b8" font-size="10.5">and the resolver waits in a queue.</text>
        <text x="346" y="1720" fill="#cbd5e1" font-size="10.5">Examples:</text>
        <text x="346" y="1736" fill="#fb923c" font-size="10.5">  ask_user_choice / confirmation</text>
        <text x="346" y="1752" fill="#fb923c" font-size="10.5">  ask_user_datetime</text>
        <text x="346" y="1780" fill="#fb923c" font-size="11" font-weight="700">⏳ awaits user</text>
        <text x="346" y="1800" fill="#94a3b8" font-size="10.5">user commits → respond(value)</text>
        <text x="346" y="1816" fill="#94a3b8" font-size="10.5">→ Promise resolves → return value</text>
        <text x="346" y="1832" fill="#94a3b8" font-size="10.5">is appended as the tool-message.</text>
        <text x="346" y="1864" fill="#94a3b8" font-size="9" font-style="italic">→ proceeds to Stage 7 once resolved</text>

        <!-- ============================================================ -->
        <!-- STAGE 7 — RECURSIVE LOOP                                     -->
        <!-- ============================================================ -->
        <!-- Frontend: recursive runAgent -->
        <rect x="60" y="1980" width="540" height="120" rx="6" fill="#0f172a"/>
        <rect x="60" y="1980" width="540" height="120" rx="6" fill="rgba(251, 146, 60, 0.18)" stroke="#fb923c" stroke-width="1.5"/>
        <text x="330" y="2002" fill="white" font-size="14" font-weight="700" text-anchor="middle">7 · recursive runAgent  <tspan fill="#fb923c" font-size="11">(frontend-tool branch only)</tspan></text>
        <text x="330" y="2019" fill="#fb923c" font-size="11" text-anchor="middle">CopilotKit core auto-issues a new POST · same threadId · new runId</text>
        <text x="76" y="2042" fill="#cbd5e1" font-size="10.5">agent.messages = [user, assistant(toolCall), tool(result)]  → POSTed in full</text>
        <text x="76" y="2058" fill="#cbd5e1" font-size="10.5"><tspan fill="#fb923c">copilotkit.runAgent({ agent })</tspan> → new POST → Stage 2 → 3 → ...</text>
        <text x="76" y="2074" fill="#94a3b8" font-size="10">Loops back through 4–6 until LLM stops calling tools.</text>
        <text x="76" y="2092" fill="#94a3b8" font-size="9.5" font-style="italic">Server-tool results never reach this stage — they loop inside the same SSE (see Stage 5).</text>

        <!-- Server: new POST cycle -->
        <rect x="720" y="1980" width="648" height="120" rx="6" fill="#0f172a"/>
        <rect x="720" y="1980" width="648" height="120" rx="6" fill="rgba(251, 146, 60, 0.18)" stroke="#fb923c" stroke-width="1.5"/>
        <text x="1044" y="2006" fill="white" font-size="14" font-weight="700" text-anchor="middle">new SSE stream</text>
        <text x="1044" y="2023" fill="#fb923c" font-size="11" text-anchor="middle">new entity_run row created; previous row already "succeeded"</text>
        <text x="736" y="2058" fill="#cbd5e1" font-size="11">runtime constructs another <tspan fill="#fb923c">new BuiltInAgent</tspan>; tools merged again.</text>
        <text x="736" y="2080" fill="#cbd5e1" font-size="11">streamText is called again with the FULL history including the tool result.</text>

        <!-- LLM: continues -->
        <rect x="1488" y="1980" width="346" height="120" rx="6" fill="#0f172a"/>
        <rect x="1488" y="1980" width="346" height="120" rx="6" fill="rgba(76, 29, 149, 0.3)" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="1661" y="2006" fill="white" font-size="13" font-weight="700" text-anchor="middle">LLM continuation</text>
        <text x="1661" y="2023" fill="#c4b5fd" font-size="11" text-anchor="middle">a fresh completion with full context</text>
        <text x="1504" y="2050" fill="#94a3b8" font-size="10.5">Reads the tool result as its</text>
        <text x="1504" y="2066" fill="#94a3b8" font-size="10.5">latest input, continues reasoning</text>
        <text x="1504" y="2082" fill="#94a3b8" font-size="10.5">→ more text / tool calls / final.</text>

        <!-- ============== ARROWS ============== -->
        <!-- Frontend Stage 1 → Stage 2 vertical (within Frontend) -->
        <line x1="330" y1="320" x2="330" y2="360" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead-cyan)"/>

        <!-- Frontend Stage 2 → Server Stage 2 (POST cross-lane) -->
        <line x1="600" y1="470" x2="720" y2="470" stroke="#22d3ee" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#arrowhead-cyan)"/>
        <text x="660" y="462" fill="#22d3ee" font-size="10" font-weight="700" text-anchor="middle">POST</text>

        <!-- Server Stage 2 → Server Stage 3 -->
        <line x1="1044" y1="580" x2="1044" y2="620" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowhead-emerald)"/>

        <!-- Server Stage 3 → Server Stage 4 -->
        <line x1="1044" y1="840" x2="1044" y2="880" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowhead-emerald)"/>

        <!-- Server Stage 4 → LLM Stage 4 (streamText) -->
        <line x1="1368" y1="980" x2="1488" y2="980" stroke="#a78bfa" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#arrowhead-violet)"/>
        <text x="1428" y="972" fill="#a78bfa" font-size="10" font-weight="700" text-anchor="middle">catalog</text>

        <line x1="1488" y1="1010" x2="1368" y2="1010" stroke="#a78bfa" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#arrowhead-violet)"/>
        <text x="1428" y="1004" fill="#a78bfa" font-size="10" font-weight="700" text-anchor="middle">parts</text>

        <line x1="720" y1="980" x2="600" y2="980" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowhead-emerald)"/>
        <text x="660" y="972" fill="#34d399" font-size="10" font-weight="700" text-anchor="middle">SSE</text>

        <!-- Server Stage 4 → Server Stage 5 -->
        <line x1="1044" y1="1080" x2="1044" y2="1120" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowhead-emerald)"/>

        <line x1="330" y1="1080" x2="330" y2="1120" stroke="#22d3ee" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.7" marker-end="url(#arrowhead-cyan)"/>

        <line x1="1368" y1="1260" x2="1488" y2="1260" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowhead-violet)"/>

        <line x1="720" y1="1242" x2="600" y2="1242" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowhead-emerald)"/>

        <line x1="720" y1="1334" x2="600" y2="1334" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowhead-amber)"/>

        <line x1="330" y1="1440" x2="330" y2="1480" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead-cyan)"/>

  <script>
    async function copyAsImage(btn) {
      const orig = btn.textContent;
      try {
        const el = document.getElementById('report-container');
        const r = el.getBoundingClientRect();
        const pad = 32;
        const canvas = await html2canvas(document.body, { backgroundColor: '#020617', scale: 2, useCORS: true, ignoreElements: (e) => e.classList && e.classList.contains('toolbar'), x: r.left + window.scrollX - pad, y: r.top + window.scrollY - pad, width: r.width + pad * 2, height: r.height + pad * 2 });
        const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        btn.textContent = '✓ Copied!';
      } catch (e) { btn.textContent = '✗ Failed'; }
      setTimeout(() => btn.textContent = orig, 2000);
    }
    async function downloadPNG(btn) {
      const orig = btn.textContent;
      btn.textContent = '⏳ ...';
      try {
        const el = document.getElementById('report-container');
        const r = el.getBoundingClientRect();
        const pad = 32;
        const canvas = await html2canvas(document.body, { backgroundColor: '#020617', scale: 2, useCORS: true, ignoreElements: (e) => e.classList && e.classList.contains('toolbar'), x: r.left + window.scrollX - pad, y: r.top + window.scrollY - pad, width: r.width + pad * 2, height: r.height + pad * 2 });
        const link = document.createElement('a');
        link.download = 'frontend-tool-flow.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        btn.textContent = '✓ Done!';
      } catch (e) { btn.textContent = '✗ Failed'; }
      setTimeout(() => btn.textContent = orig, 2000);
    }
    async function downloadPDF(btn) {
      const orig = btn.textContent;
      btn.textContent = '⏳ ...';
      try {
        const el = document.getElementById('report-container');
        const r = el.getBoundingClientRect();
        const pad = 32;
        const canvas = await html2canvas(document.body, { backgroundColor: '#020617', scale: 2, useCORS: true, ignoreElements: (e) => e.classList && e.classList.contains('toolbar'), x: r.left + window.scrollX - pad, y: r.top + window.scrollY - pad, width: r.width + pad * 2, height: r.height + pad * 2 });
        const imgData = canvas.toDataURL('image/png');
        const { jsPDF } = window.jspdf;
        const orientation = canvas.width > canvas.height ? 'landscape' : 'portrait';
        const pdf = new jsPDF({ orientation, unit: 'px', format: [canvas.width, canvas.height], hotfixes: ['px_scaling'] });
        pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height);
        pdf.save('frontend-tool-flow.pdf');
        btn.textContent = '✓ Done!';
      } catch (e) { btn.textContent = '✗ Failed'; }
      setTimeout(() => btn.textContent = orig, 2000);
    }
  </script>
