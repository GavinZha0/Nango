<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nango Chat Dispatch — Upstream Data Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" integrity="sha384-ZZ1pncU3bQe8y31yfZdMFdSpttDoPmOZg2wguVK9almUodir1PghgT0eY7Mrty8H" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js" integrity="sha384-en/ztfPSRkGfME4KIm05joYXynqzUgbsG5nMrj/xEFAHXkeZfO3yMK8QQ+mP7p1/" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'JetBrains Mono', monospace; background: #020617; min-height: 100vh; padding: 2rem; color: white; }
    .container { max-width: 1400px; margin: 0 auto; }
    .header { margin-bottom: 2rem; }
    .header-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; }
    .pulse-dot { width: 12px; height: 12px; background: #22d3ee; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.025em; }
    .subtitle { color: #94a3b8; font-size: 0.875rem; margin-left: 1.75rem; }
    .diagram-container { background: rgba(15, 23, 42, 0.5); border-radius: 1rem; border: 1px solid #1e293b; padding: 1.5rem; overflow-x: auto; }
    svg { width: 100%; min-width: 1100px; display: block; }
    .footer { text-align: center; margin-top: 1.5rem; color: #475569; font-size: 0.75rem; }
    .toolbar { display: flex; gap: 0.5rem; margin-left: auto; flex-shrink: 0; align-items: center; }
    .toolbar-toggle { background: transparent; border: none; color: #475569; cursor: pointer; font-size: 1.25rem; line-height: 1; padding: 0.25rem 0.5rem; border-radius: 0.375rem; transition: color 0.2s, background 0.2s; }
    .toolbar-toggle:hover { color: #94a3b8; background: rgba(30, 41, 59, 0.5); }
    .toolbar-actions { display: none; gap: 0.5rem; }
    .toolbar.expanded .toolbar-actions { display: flex; }
    .toolbar-actions button { background: rgba(30, 41, 59, 0.8); border: 1px solid #334155; color: #94a3b8; padding: 0.375rem 0.75rem; border-radius: 0.375rem; font-family: inherit; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .toolbar-actions button:hover { background: rgba(51, 65, 85, 0.8); color: white; border-color: #475569; }
    @media print { body { background: #020617; padding: 1rem; } .toolbar { display: none !important; } }
  </style>
</head>
<body>
  <div class="container" id="report-container">
    <div class="header">
      <div class="header-row">
        <div class="pulse-dot"></div>
        <h1>Nango Chat Dispatch — Upstream Data Flow</h1>
        <div class="toolbar">
          <div class="toolbar-actions">
            <button onclick="copyAsImage(this)">📋 Copy</button>
            <button onclick="downloadPNG(this)">🖼️ PNG</button>
            <button onclick="downloadPDF(this)">📄 PDF</button>
          </div>
          <button class="toolbar-toggle" onclick="this.parentElement.classList.toggle('expanded')" title="Export options" aria-label="Export options">⋯</button>
        </div>
      </div>
      <p class="subtitle">LLM tokens streaming back to the UI</p>
    </div>

    <div class="diagram-container">
      <svg viewBox="0 0 1200 820">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
          </marker>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)" />

        <rect x="400" y="40" width="400" height="80" rx="6" fill="#0f172a"/>
        <rect x="400" y="40" width="400" height="80" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="600" y="62" fill="white" font-size="12" font-weight="700" text-anchor="middle">&lt;CopilotChat&gt;  UI render</text>
        <text x="414" y="98" fill="#cbd5e1" font-size="9">• React state diff &#8594; re-render</text>
        <text x="414" y="112" fill="#cbd5e1" font-size="9">• User sees new tokens / tool cards / artifacts</text>
        <rect x="360" y="170" width="480" height="130" rx="6" fill="#0f172a"/>
        <rect x="360" y="170" width="480" height="130" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
        <text x="600" y="192" fill="white" font-size="12" font-weight="700" text-anchor="middle">CopilotKit Transport  (browser + server)</text>
        <text x="600" y="208" fill="#fbbf24" font-size="9" text-anchor="middle">SSE encoder · EventSource · runAgentSubscriber · applyEvent</text>
        <text x="374" y="228" fill="#cbd5e1" font-size="9">• server: BaseEvent &#8594; `data: &lt;JSON&gt;\n\n` SSE frame</text>
        <text x="374" y="242" fill="#cbd5e1" font-size="9">• browser: EventSource.onmessage &#8594; JSON.parse &#8594; BaseEvent</text>
        <text x="374" y="256" fill="#cbd5e1" font-size="9">• applyEvent: merge into agent.messages / agent.state</text>
        <rect x="360" y="350" width="480" height="130" rx="6" fill="#0f172a"/>
        <rect x="360" y="350" width="480" height="130" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
        <text x="600" y="372" fill="white" font-size="12" font-weight="700" text-anchor="middle">PersistingAgent.run  subscriber.next</text>
        <text x="600" y="388" fill="#fb7185" font-size="9" text-anchor="middle">lib/runner/persisting-agent.ts</text>
        <text x="374" y="408" fill="#cbd5e1" font-size="9">• handleEvent  &#8594;  coalesce (TEXT / REASONING / TOOL_CALL buffers)</text>
        <text x="374" y="422" fill="#cbd5e1" font-size="9">• flush at boundaries (END / RUN_FINISHED)  &#8594;  recordEvent</text>
        <text x="374" y="436" fill="#cbd5e1" font-size="9">• subscriber.next(rawEv)  &#8594;  forward raw event downstream</text>
        <rect x="940" y="380" width="200" height="70" rx="6" fill="#0f172a"/>
        <rect x="940" y="380" width="200" height="70" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="1040" y="402" fill="white" font-size="12" font-weight="700" text-anchor="middle">entity_run_event</text>
        <text x="1040" y="418" fill="#a78bfa" font-size="9" text-anchor="middle">Postgres · audit trail</text>
        <rect x="360" y="540" width="480" height="130" rx="6" fill="#0f172a"/>
        <rect x="360" y="540" width="480" height="130" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="600" y="562" fill="white" font-size="12" font-weight="700" text-anchor="middle">Inner Agent.run  (AgnoBridgeAgent / BuiltInAgent)</text>
        <text x="600" y="578" fill="#34d399" font-size="9" text-anchor="middle">for-await SSE loop · provider chunk &#8594; AG-UI event</text>
        <text x="374" y="598" fill="#cbd5e1" font-size="9">• parse provider-native SSE chunk</text>
        <text x="374" y="612" fill="#cbd5e1" font-size="9">   (OpenAI delta · agno RunContent · Dify chunked · ...)</text>
        <text x="374" y="626" fill="#cbd5e1" font-size="9">• emit AG-UI event (TEXT_MESSAGE_CONTENT / TOOL_CALL_* / ...)</text>
        <rect x="400" y="720" width="400" height="60" rx="30" fill="#0f172a"/>
        <rect x="400" y="720" width="400" height="60" rx="30" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
        <text x="600" y="745" fill="white" font-size="12" font-weight="700" text-anchor="middle">LLM Endpoint</text>
        <text x="600" y="762" fill="#94a3b8" font-size="9" text-anchor="middle">OpenAI · Anthropic · Gemini  ·  (agno/Mastra/Dify)</text>
        <line x1="600" y1="720" x2="600" y2="670" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrowhead)"/>
        <text x="610" y="700" fill="#94a3b8" font-size="9" font-weight="600" text-anchor="start">provider-native SSE chunks</text>
        <line x1="600" y1="540" x2="600" y2="480" stroke="#34d399" stroke-width="1.8" marker-end="url(#arrowhead)"/>
        <text x="610" y="515" fill="#34d399" font-size="9" font-weight="600" text-anchor="start">AG-UI BaseEvent (per chunk)</text>
        <line x1="600" y1="350" x2="600" y2="300" stroke="#fb7185" stroke-width="1.8" marker-end="url(#arrowhead)"/>
        <text x="610" y="330" fill="#fb7185" font-size="9" font-weight="600" text-anchor="start">subscriber.next(rawEv)</text>
        <line x1="600" y1="170" x2="600" y2="120" stroke="#fbbf24" stroke-width="1.8" marker-end="url(#arrowhead)"/>
        <text x="610" y="150" fill="#fbbf24" font-size="9" font-weight="600" text-anchor="start">React state update</text>
        <path d="M 840 415 L 940 415" fill="none" stroke="#a78bfa" stroke-width="1.8" marker-end="url(#arrowhead)"/>
        <text x="890" y="408" fill="#a78bfa" font-size="9" font-weight="600" text-anchor="middle">recordEvent</text>
      </svg>
    </div>
  </div>

  <script>
    async function copyAsImage(btn) {
      const orig = btn.textContent;
      try {
        const el = document.getElementById('report-container');
        const r = el.getBoundingClientRect();
        const pad = 32;
        const canvas = await html2canvas(document.body, { backgroundColor: '#020617', scale: 2, useCORS: true, ignoreElements: (e) => e.classList && e.classList.contains('toolbar'), x: r.left + window.scrollX - pad, y: r.top + window.scrollY - pad, width: r.width + pad * 2, height: r.height + pad * 2 });
        const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        btn.textContent = '✓ Copied!';
      } catch (e) { btn.textContent = '✗ Failed'; }
      setTimeout(() => btn.textContent = orig, 2000);
    }
    async function downloadPNG(btn) {
      const orig = btn.textContent;
      btn.textContent = '⏳ ...';
      try {
        const el = document.getElementById('report-container');
        const r = el.getBoundingClientRect();
        const pad = 32;
        const canvas = await html2canvas(document.body, { backgroundColor: '#020617', scale: 2, useCORS: true, ignoreElements: (e) => e.classList && e.classList.contains('toolbar'), x: r.left + window.scrollX - pad, y: r.top + window.scrollY - pad, width: r.width + pad * 2, height: r.height + pad * 2 });
        const link = document.createElement('a');
        link.download = 'chat-dispatch-upstream.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        btn.textContent = '✓ Done!';
      } catch (e) { btn.textContent = '✗ Failed'; }
      setTimeout(() => btn.textContent = orig, 2000);
    }
    async function downloadPDF(btn) {
      const orig = btn.textContent;
      btn.textContent = '⏳ ...';
      try {
        const el = document.getElementById('report-container');
        const r = el.getBoundingClientRect();
        const pad = 32;
        const canvas = await html2canvas(document.body, { backgroundColor: '#020617', scale: 2, useCORS: true, ignoreElements: (e) => e.classList && e.classList.contains('toolbar'), x: r.left + window.scrollX - pad, y: r.top + window.scrollY - pad, width: r.width + pad * 2, height: r.height + pad * 2 });
        const imgData = canvas.toDataURL('image/png');
        const { jsPDF } = window.jspdf;
        const orientation = canvas.width > canvas.height ? 'landscape' : 'portrait';
        const pdf = new jsPDF({ orientation, unit: 'px', format: [canvas.width, canvas.height], hotfixes: ['px_scaling'] });
        pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height);
        pdf.save('chat-dispatch-upstream.pdf');
        btn.textContent = '✓ Done!';
      } catch (e) { btn.textContent = '✗ Failed'; }
      setTimeout(() => btn.textContent = orig, 2000);
    }
  </script>
</body>
</html>
