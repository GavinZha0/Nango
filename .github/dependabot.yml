version: 2
updates:
  # JavaScript / TypeScript dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      next-stack:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "eslint-config-next"
      drizzle:
        patterns:
          - "drizzle-orm"
          - "drizzle-kit"
      copilotkit:
        patterns:
          - "@copilotkit/*"
      ai-sdk:
        patterns:
          - "@ai-sdk/*"
          - "ai"
      types:
        patterns:
          - "@types/*"
      dev-dependencies:
        dependency-type: "development"
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci(deps)"
      include: "scope"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "build(docker)"
      include: "scope"
