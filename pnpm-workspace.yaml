# pnpm 11+ workspace configuration.
#
# As of pnpm 11, settings (other than auth/registry) live HERE rather than in
# package.json#pnpm or .npmrc. See https://pnpm.io/11.x/migration.

# Pin transitive versions that must stay aligned with our hand-tested
# CopilotKit / AG-UI / rxjs combination. Moved from package.json#pnpm.overrides
# in the v10 → v11 migration (pnpm 11 silently ignores package.json#pnpm).
overrides:
  "@ag-ui/client": "0.0.52"
  "@ag-ui/core": "0.0.52"
  rxjs: "7.8.1"

# Build-script policy. With pnpm 11's `strictDepBuilds: true` default, any
# package not listed here that wants to run a build / postinstall script will
# fail `pnpm install`. Keep this list tight — every `true` is an explicit
# decision to let third-party code execute on install.
allowBuilds:
  # Required — these install/build steps are essential.
  esbuild: true              # platform binary for Next.js / vitest bundling
  msw: true                  # Mock Service Worker test harness CLI init

  # Optional native bindings — pure-JS fallback is sufficient.
  sharp: false               # advanced image transforms (unused)
  unrs-resolver: false       # ESLint experimental native resolver
  ssh2: false                # node-ssh falls back to Node's crypto
  cpu-features: false        # paired with ssh2; CPU feature detection

  # Telemetry — explicitly refused.
  "@scarf/scarf": false
